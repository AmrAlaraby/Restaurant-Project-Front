<!-- OVERLAY -->
 @if (isOpen) {
<div 
  class="sb-overlay"
  (click)="onClose()">
</div>}

<!-- SIDEBAR -->
<aside class="sidebar" [class.open]="isOpen">

  <!-- BRAND -->
  <div class="sb-brand">
    <div class="sb-logo">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 16V8l6-5 6 5v8"/><rect x="7" y="11" width="6" height="5" rx="1"/>
      </svg>
    </div>
    <div class="sb-brand-text">
      <span class="sb-brand-name">RMS</span>
      <span class="sb-brand-sub">PLATFORM</span>
    </div>

    <button class="sb-close-btn" (click)="onClose()">✕</button>
  </div>

  <!-- NAV -->
  <nav class="sb-nav">

    <nav class="sb-nav">

      @for (section of sections; track $index) {
  <div class="sb-section">

    <span class="sb-section-label">{{ SectionPrefix + section.title | translate }}</span>

    <ul>
      @for (link of section.links; track $index) {
      <li>

        <a class="sb-link"
           [routerLink]="['/', prefix, link.route]"
           routerLinkActive="active">

          <span class="sb-icon" [innerHTML]="sanitize(link.icon)"></span>

          <span class="sb-label">
            {{ LinkPrifix + link.title | translate }}
          </span>

        </a>

      </li>}
    </ul>

  </div>}

</nav>

    

  </nav>

  <!-- USER -->
  <div class="sb-user">
    <div class="sb-user-avatar">{{AvatarLetters}}</div>

    <div class="sb-user-info">
      <span class="sb-user-name">{{UserName}}</span>
      <span class="sb-user-role">{{UserRole}}</span>
    </div>
    <button class="sb-logout" (click)="logout()">
      {{ 'SHARED.SIDEBAR.USER.LOGOUT' | translate }}
    </button>
  </div>

</aside>
