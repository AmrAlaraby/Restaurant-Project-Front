<!-- OVERLAY -->
 @if (isOpen) {
<div 
  class="sb-overlay"
  (click)="onClose()">
</div>}

<!-- SIDEBAR -->
<aside class="sidebar" [class.open]="isOpen">

  <!-- BRAND -->
  <div class="sb-brand">
    <div class="sb-logo">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 16V8l6-5 6 5v8"/><rect x="7" y="11" width="6" height="5" rx="1"/>
      </svg>
    </div>
    <div class="sb-brand-text">
      <span class="sb-brand-name">RMS</span>
      <span class="sb-brand-sub">PLATFORM</span>
    </div>

    <button class="sb-close-btn" (click)="onClose()">✕</button>
  </div>

  <!-- NAV -->
  <nav class="sb-nav">

    <!-- OVERVIEW -->
    <div class="sb-section">
      <span class="sb-section-label">Overview</span>
      <ul>
        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'dashboard']"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
              </svg>
            </span>
            <span class="sb-label">Dashboard</span>
          </a>
        </li>
      </ul>
    </div>

    <!-- OPERATIONS -->
    <div class="sb-section">
      <span class="sb-section-label">Operations</span>
      <ul>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'orders']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M5 3V2M11 3V2M2 7h12"/>
              </svg>
            </span>
            <span class="sb-label">Orders</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'kitchen']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 13V7l5-4 5 4v6"/><path d="M6 13v-3h4v3"/>
              </svg>
            </span>
            <span class="sb-label">Kitchen</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'tables']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="5" width="14" height="8" rx="1"/><path d="M4 5V4a2 2 0 014 0v1M8 5V4a2 2 0 014 0v1"/>
              </svg>
            </span>
            <span class="sb-label">Tables</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'deliveries']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="6" cy="6" r="3"/><path d="M2 13c0-2.5 2.2-4 4-4s4 1.5 4 4"/>
                <circle cx="12" cy="6" r="2"/><path d="M15 13c0-2-1.5-3-3-3"/>
              </svg>
            </span>
            <span class="sb-label">Deliveries</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'payments']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="14" height="9" rx="1"/><path d="M1 8h14"/>
              </svg>
            </span>
            <span class="sb-label">Payments</span>
          </a>
        </li>

      </ul>
    </div>

    <!-- CATALOGUE -->
    <div class="sb-section">
      <span class="sb-section-label">Catalogue</span>
      <ul>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'menu-items']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 2h4v4H2zM10 2h4v4h-4zM2 10h4v4H2zM10 10h4v4h-4z"/>
              </svg>
            </span>
            <span class="sb-label">Menu Items</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'stock']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5 8h6M8 5v6"/>
              </svg>
            </span>
            <span class="sb-label">Stock</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'categories']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 2l1.5 3H13l-2.7 2 1 3.2L8 8.5l-3.3 1.7 1-3.2L3 5h3.5z"/>
              </svg>
            </span>
            <span class="sb-label">Categories</span>
          </a>
        </li>
        
        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'ingredients']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 2a4 4 0 0 1 4 4c0 4-4 8-4 8S4 10 4 6a4 4 0 0 1 4-4z"/><circle cx="8" cy="6" r="1.5"/>
              </svg>
            </span>
            <span class="sb-label">Ingredients</span>
          </a>
        </li>

      </ul>
    </div>

    <!-- MANAGEMENT -->
    <div class="sb-section">
      <span class="sb-section-label">Management</span>
      <ul>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'users']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-2.5 2.2-4 5-4s5 1.5 5 4"/>
                <circle cx="12" cy="5" r="2"/><path d="M15 13c0-2-1.5-3-3-3"/>
              </svg>
            </span>
            <span class="sb-label">Users</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'branches']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 13V7l5-4 5 4v6M6 13v-3h4v3"/>
              </svg>
            </span>
            <span class="sb-label">Branches</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'reports']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 4h12M2 8h8M2 12h10"/>
              </svg>
            </span>
            <span class="sb-label">Reports</span>
          </a>
        </li>

        <li>
          <a class="sb-link"
             [routerLink]="['/', prefix, 'settings']"
             routerLinkActive="active">
            <span class="sb-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="2"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.5 3.5l1.5 1.5M11 11l1.5 1.5M3.5 12.5L5 11M11 5l1.5-1.5"/>
              </svg>
            </span>
            <span class="sb-label">Settings</span>
          </a>
        </li>

      </ul>
    </div>

  </nav>

  <!-- USER -->
  <div class="sb-user">
    <div class="sb-user-avatar">{{AvatarLetters}}</div>

    <div class="sb-user-info">
      <span class="sb-user-name">{{UserName}}</span>
      <span class="sb-user-role">{{UserRole}}</span>
    </div>
    <button class="sb-logout" (click)="logout()">
      Logout
    </button>
  </div>

</aside>
