<div class="lang-switch" (click)="toggleLang()">
  <div class="pill" [attr.data-lang]="currentLang">
    <div class="slider" #slider></div>
    <div class="seg" [class.active]="currentLang === 'en'" #enSeg>EN</div>
    <div class="seg" [class.active]="currentLang === 'ar'" #arSeg>AR</div>
  </div>
</div>
