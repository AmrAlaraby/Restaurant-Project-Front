<div class="page">

  <div class="layout">

    <!-- LEFT (Reuse) -->
    <div class="left-panel">

      <div class="card">
        <app-category-filter
        [categories]="categories"
        (select)="onCategoryChange($event)"
          ></app-category-filter>
      </div>

      <div class="card menu-card">
        <app-menu-list
          [items]="menuItems"
          [pageIndex]="pageIndex"
          [pageSize]="pageSize"
          [totalCount]="totalCount"
          (pageChanged)="onPageChange($event)"
          (add)="addToOrder($event)">
        </app-menu-list>
      </div>

    </div>

    <!-- RIGHT -->
      <div class="right-panel">

      <!-- ORDER TYPE -->
      <div class="card">
        <app-order-type-selector
          [(type)]="orderType">
        </app-order-type-selector>
      </div>

      <!-- DINE IN -->
      <ng-container *ngIf="orderType === 'DineIn'">

        <div class="card">
          <app-table-selector
            [tables]="tables"
            [(tableId)]="selectedTableId">
          </app-table-selector>
        </div>

        <div class="card">
        <app-order-summary
        [items]="orderItems"
        [total]="total"
        (remove)="removeItem($event)"
        (decrease)="decreaseQty($event)">
        </app-order-summary>
      </div>

      </ng-container>

      <!-- PICKUP -->
      <ng-container *ngIf="orderType === 'PickUp'">

        <div class="card">
        <app-order-summary
        [items]="orderItems"
        [total]="total"
        (remove)="removeItem($event)"
        (decrease)="decreaseQty($event)">
        </app-order-summary>
      </div>

      </ng-container>

      <!-- DELIVERY -->
      <ng-container *ngIf="orderType === 'Delivery'">

        <div class="card delivery-placeholder">
          <p>Customer Search & Address will be implemented next</p>
        </div>

      </ng-container>

    </div>

  </div>

</div>
