<div class="page">

  <div class="layout">

    <!-- LEFT (Reuse) -->
    <div class="left-panel">

      <div class="card">
        <app-category-filter
        [categories]="categories"
        (select)="onCategoryChange($event)"
          ></app-category-filter>
      </div>

      <div class="card menu-card">
        <app-menu-list
          [items]="menuItems"
          [pageIndex]="pageIndex"
          [pageSize]="pageSize"
          [totalCount]="totalCount"
          (pageChanged)="onPageChange($event)"
          (add)="addToOrder($event)">
        </app-menu-list>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">

      <div class="card">
        <p>Order Type + Dynamic Content (next commit)</p>
      </div>

    </div>

  </div>

</div>
