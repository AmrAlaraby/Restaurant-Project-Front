<div class="page">

  <div class="layout">

    <!-- LEFT (Reuse) -->
    <div class="left-panel">

      <div class="card">
        <app-category-filter
        [categories]="categories"
        (select)="onCategoryChange($event)"
          ></app-category-filter>
      </div>

      <div class="card menu-card">
        <app-menu-list
          [items]="menuItems"
          [pageIndex]="pageIndex"
          [pageSize]="pageSize"
          [totalCount]="totalCount"
          (pageChanged)="onPageChange($event)"
          (add)="addToOrder($event)">
        </app-menu-list>
      </div>

    </div>

    <!-- RIGHT -->
      <div class="right-panel">

      <!-- ORDER TYPE -->
      <div class="card">
        <app-order-type-selector
          [(type)]="orderType">
        </app-order-type-selector>
      </div>

      <!-- DINE IN -->
      <ng-container *ngIf="orderType === 'DineIn'">

        <div class="card">
          <app-table-selector
            [tables]="tables"
            [(tableId)]="selectedTableId">
          </app-table-selector>
        </div>

        <div class="card">
        <app-order-summary
        [items]="orderItems"
        [total]="total"
        (remove)="removeItem($event)"
        (decrease)="decreaseQty($event)">
        </app-order-summary>
      </div>

      </ng-container>

      <!-- PICKUP -->
      <ng-container *ngIf="orderType === 'PickUp'">

        <div class="card">
        <app-order-summary
        [items]="orderItems"
        [total]="total"
        (remove)="removeItem($event)"
        (decrease)="decreaseQty($event)">
        </app-order-summary>
      </div>

      </ng-container>

      <!-- DELIVERY -->
<ng-container *ngIf="orderType === 'Delivery'">

  <!-- SEARCH -->
  <div class="card">
    <app-customer-search
      (select)="onCustomerSelected($event)">
    </app-customer-search>
  </div>

  <!-- CUSTOMER -->
  <div class="card" *ngIf="selectedCustomer">

    <h4>{{ selectedCustomer.name }}</h4>
    <p>{{ selectedCustomer.phoneNumber }}</p>

  </div>

  <!-- ADDRESSES -->
  <div class="card" *ngIf="selectedCustomer">

    <app-address-selector
      [addresses]="selectedCustomer.addresses"
      [selected]="selectedAddress"
      (select)="onAddressSelected($event)"
      (add)="addAddress($event)">
    </app-address-selector>

  </div>



<!-- SUMMARY -->
<div class="card">

<app-order-summary
        [items]="orderItems"
        [total]="total"
        (remove)="removeItem($event)"
        (decrease)="decreaseQty($event)">
        </app-order-summary>

</div>


</ng-container>

          <!-- PAYMENT -->
<div class="card">

  <h4>Payment</h4>

  <div class="payments">

    <button
      *ngFor="let p of ['Cash','Card','Instapay','Wallet']"
      [class.active]="paymentMethod === p"
      (click)="paymentMethod = p">

      {{ p }}

    </button>

  </div>

</div>

<!-- MARK AS PAID -->
<div *ngIf="lastOrderId" style="display: flex; gap: 8px; margin-top: 8px;">

  <button
    class="submit-btn"
    style="background: #2980b9;"
    (click)="markAsPaid()">
    Mark as Paid
  </button>

  <button
    style="padding: 14px 18px; border: none; border-radius: 10px; background: #eee; cursor: pointer; font-size: 16px;"
    (click)="lastOrderId = undefined">
    ✕
  </button>

</div>
<!-- SUBMIT -->
<button
  class="submit-btn"
  [disabled]="!canSubmit() || submitting"
  (click)="submitOrder()">

  {{ submitting ? 'Processing...' : 'Create Order' }}

</button>




    </div>

  </div>

</div>
