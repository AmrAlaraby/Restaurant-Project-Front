<div class="dashboard">

  <!-- ── Top Bar ─────────────────────────────────────────── -->
  <header class="top-bar">
    <div class="greeting-block">
      <h1 class="greeting">
        {{ 'CASHIER.DASHBOARD.GREETING' | translate:{ name: cashierName } }}
      </h1>

      <p class="sub-info">
        {{ 'CASHIER.DASHBOARD.SUBINFO' | translate:{ branch: getBranchName() } }}
      </p>
    </div>

    <button class="process-btn" routerLink="/cashier/payments">
      {{ 'CASHIER.DASHBOARD.BUTTONS.PROCESS_PAYMENT' | translate }}
    </button>
  </header>

  <!-- ── Stats Row ───────────────────────────────────────── -->
  <app-dashboard-stats [stats]="stats"></app-dashboard-stats>

  <!-- ── Awaiting Payment List ───────────────────────────── -->
  <section class="section">

    <div class="section-header">
      <div class="section-title">
        <span class="section-icon">⏳</span>
        <h2>{{ 'CASHIER.DASHBOARD.SECTIONS.AWAITING_PAYMENT' | translate }}</h2>
      </div>

      <button class="process-btn" (click)="goToOrders()">
        {{ 'CASHIER.DASHBOARD.BUTTONS.VIEW_ALL' | translate }}
      </button>
    </div>

    <app-awaiting-orders-list (onPayNow)="goToPayment($event)">
    </app-awaiting-orders-list>

  </section>

  <!-- ── Bottom Row ──────────────────────────────────────── -->
  <div class="bottom-row">

    <app-payment-methods-summary
      [summary]="paymentSummary">
    </app-payment-methods-summary>

    <app-recent-transactions
      [transactions]="recentTransactions">
    </app-recent-transactions>

  </div>

</div>
