<div class="types">

  <button
    [class.active]="type === 'DineIn'"
    (click)="select('DineIn')">
    {{ 'CASHIER.CREATE_ORDER.TYPE.DineIn' | translate }}
  </button>

  <button
    [class.active]="type === 'PickUp'"
    (click)="select('PickUp')">
    {{ 'CASHIER.CREATE_ORDER.TYPE.Pickup' | translate }}
  </button>

  <button
    [class.active]="type === 'Delivery'"
    (click)="select('Delivery')">
    {{ 'CASHIER.CREATE_ORDER.TYPE.Delivery' | translate }}
  </button>

</div>
