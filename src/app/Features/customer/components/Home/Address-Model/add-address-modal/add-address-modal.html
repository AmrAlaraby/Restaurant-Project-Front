<div class="overlay" (click)="close()"></div>

<div class="address-modal">

  <div class="modal-header">
    <h4>{{ 'CUSTOMER.ADDRESS_MODAL.TITLE' | translate }}</h4>
    <button class="close-btn" (click)="close()">✕</button>
  </div>

  <div class="modal-body">

    <div class="field">
      <label>{{ 'CUSTOMER.ADDRESS_MODAL.BUILDING' | translate }} *</label>
      <input type="number" [(ngModel)]="form.buildingNumber" />
    </div>

    <div class="field">
      <label>{{ 'CUSTOMER.ADDRESS_MODAL.STREET' | translate }} *</label>
      <input type="text" [(ngModel)]="form.street" />
    </div>

    <div class="field">
      <label>{{ 'CUSTOMER.ADDRESS_MODAL.CITY' | translate }} *</label>
      <input type="text" [(ngModel)]="form.city" />
    </div>

    <div class="field">
      <label>{{ 'CUSTOMER.ADDRESS_MODAL.NOTE' | translate }}</label>
      <input type="text" [(ngModel)]="form.note" />
    </div>

    <div class="field">
      <label>{{ 'CUSTOMER.ADDRESS_MODAL.SPECIAL_MARK' | translate }}</label>
      <input type="text" [(ngModel)]="form.specialMark" />
    </div>

  </div>

  <div class="modal-footer">
    <button (click)="close()">
      {{ 'CUSTOMER.ADDRESS_MODAL.CANCEL' | translate }}
    </button>

    <button (click)="submit()" [disabled]="loading">
      {{ loading 
        ? ('CUSTOMER.ADDRESS_MODAL.SAVING' | translate) 
        : ('CUSTOMER.ADDRESS_MODAL.SAVE' | translate) 
      }}
    </button>
  </div>

</div>
