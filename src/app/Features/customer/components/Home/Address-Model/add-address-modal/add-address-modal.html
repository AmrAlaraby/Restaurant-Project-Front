<div class="overlay" (click)="close()"></div>

<div class="address-modal">

    <div class="modal-header">
        <h4>Add New Address</h4>
        <button class="close-btn" (click)="close()">✕</button>
    </div>

    <div class="modal-body">

        <div class="field">
            <label>Building Number *</label>
            <input type="number" [(ngModel)]="form.buildingNumber" />
        </div>

        <div class="field">
            <label>Street *</label>
            <input type="text" [(ngModel)]="form.street" />
        </div>

        <div class="field">
            <label>City *</label>
            <input type="text" [(ngModel)]="form.city" />
        </div>

        <div class="field">
            <label>Note</label>
            <input type="text" [(ngModel)]="form.note" />
        </div>

        <div class="field">
            <label>Special Mark</label>
            <input type="text" [(ngModel)]="form.specialMark" />
        </div>

    </div>

    <div class="modal-footer">
        <button (click)="close()">Cancel</button>
        <button (click)="submit()" [disabled]="loading">
            {{ loading ? 'Saving...' : 'Save Address' }}
        </button>
    </div>

</div>
