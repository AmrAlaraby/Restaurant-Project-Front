<div class="menu-card">

    <div class="image-wrapper">
        <img [src]="item.imageUrl" alt="{{ item.name }}" />
    </div>

    <div class="card-body">

        <div class="info">
            <h6 class="title">{{ getItemName(item) }}</h6>

            <div class="meta">
                <span>{{ getCategoryName(item) }}</span>
                <span>
                  • {{ item.prepTimeMinutes }}
                  {{ 'CUSTOMER.HOME.MENU_ITEM.MIN' | translate }}
                </span>
            </div>

            <p class="price">
              {{ 'CUSTOMER.HOME.MENU_ITEM.CURRENCY' | translate }}
              {{ item.price }}
            </p>
        </div>

        <button class="add-btn" (click)="addToCart(item)">
            + {{ 'CUSTOMER.HOME.MENU_ITEM.BUTTON_ADD' | translate }}
        </button>

    </div>

</div>
