@if (popularItems.length > 0) {

<!-- header -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="section-title">
        {{ 'CUSTOMER.HOME.POPULARC.MOST_POPULAR' | translate }}
    </h5>

    <button class="btn btn-sm btn-outline-primary" (click)="goToBrowse()">
        {{ 'CUSTOMER.HOME.POPULARC.SEE_ALL' | translate }}
    </button>
</div>

<div class="row g-3">

    @for (item of popularItems; track item.id) {
    <div class="col-6 col-md-4 col-lg-3">
        <app-customer-menu-item-card [item]="item">
        </app-customer-menu-item-card>
    </div>
    }

</div>
}
