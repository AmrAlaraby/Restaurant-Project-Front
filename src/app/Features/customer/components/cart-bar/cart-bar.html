@if (basket$ | async; as basket) {

@if (basket.items && basket.items.length > 0) {

<div class="cart-bar" (click)="goToCart()">

    🛒 {{ 'CUSTOMER.HOME.CART_BAR.VIEW_CART' | translate }}
    ({{ getCount(basket) }})
    - {{ 'CUSTOMER.HOME.CART_BAR.CURRENCY' | translate }} {{ getTotal(basket) }}

</div>

}

}
