<div class="container py-4 page-wrapper">

  <!-- TOP BAR (Branch Selector فقط) -->
  <div class="top-bar d-flex justify-content-end align-items-center mb-4">

    <app-branch-selector class="branch-btn"></app-branch-selector>

  </div>

  <!-- CTA -->
  <div class="browse-cta mb-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h5 class="mb-1">What are you craving?</h5>
        <p class="text-muted mb-0">Explore our full menu</p>
      </div>

      <!-- رجعنا الزر هنا زي ما كان -->
      <button class="btn browse-btn" (click)="goToBrowse()">
        Browse Menu →
      </button>

    </div>
  </div>

  <!-- Categories -->
  <section class="mb-4">
    <h5 class="section-title mb-3">Categories</h5>
    <app-category-list></app-category-list>
  </section>

  @for (item of ActiveOrders; track item.id) {
  <div class="my-3 rounded rounded-4"
    style="background:rgba(34,211,160,.08);border:1px solid rgba(34,211,160,.25);border-radius:var(--r2);padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;"
    (click)="onTrackDelivery(item.id)">

    <div style="font-size:28px;">🚴</div>

    <div style="flex:1;">
      <div style="font-weight:600;font-size:14px;color:var(--teal);">
        Order {{ item.id }} is {{ item.status }}
      </div>

      @if (item.delivery?.driverName) {
      <div style="font-size:12px;color:var(--text3);margin-top:2px;">
        delivery is {{ item.delivery?.deliveryStatus }}
      </div>

      <div style="font-size:12px;color:var(--text3);margin-top:2px;">
        {{ item.delivery?.driverName }} is delivering
      </div>
      }
    </div>

    <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--teal);font-weight:500;">
      Track <span>→</span>
    </div>

  </div>
  }

  <!-- Popular -->
  <section class="mb-4">
    <app-popular-items></app-popular-items>
  </section>

  <app-cart-bar></app-cart-bar>

</div>
