<!-- Loading -->
@if (loading()) {
  <div class="loading-wrap">
    <div class="spinner"></div>
    <span>{{ 'CUSTOMER.TRACK_DELIVERY.LOADING' | translate }}</span>
  </div>
}

<!-- Content -->
@if (!loading() && delivery()) {
  <div class="page-wrap">

    <app-track-delivery-header
      [orderId]="delivery()!.order.id"
      [branchName]="delivery()!.order"
      (back)="goBack()"
    />

    <app-track-driver-card
      [driverName]="delivery()!.driverName ?? null"
      [driverPhone]="delivery()!.driverNumber ?? null"
      (call)="callDriver()"
      (message)="messageDriver()"
    />

    <app-track-timeline
      [steps]="steps"
      [currentIndex]="currentIndex"
    />

    <app-track-info-grid
      [address]="delivery()!.deliveryAddress"
      [items]="delivery()!.order.items"
      [totalAmount]="delivery()!.order.totalAmount"
      [cashCollected]="delivery()!.cashCollected ?? null"
    />

  </div>
}

<!-- Not found -->
@if (!loading() && !delivery()) {
  <p>{{ 'CUSTOMER.TRACK_DELIVERY.NOT_FOUND' | translate }}</p>

<button class="back-btn" (click)="goBack()">
  ← {{ 'CUSTOMER.TRACK_DELIVERY.BACK' | translate }}
</button>
}
