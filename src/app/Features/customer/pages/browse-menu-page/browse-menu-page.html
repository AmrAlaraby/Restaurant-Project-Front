<div class="container py-4">

    <!-- search -->
    <div class="mb-3">
        <input type="text"
               class="form-control"
               [placeholder]="'CUSTOMER.MENU.SEARCH' | translate"
               [formControl]="searchControl" />
    </div>

    <!-- categories + sort -->
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">

        <!-- categories -->
        <div class="d-flex gap-2 flex-wrap">

            <button class="btn btn-sm"
                [class.btn-dark]="selectedCategoryId === null"
                [class.btn-outline-dark]="selectedCategoryId !== null"
                (click)="selectCategory(null)">

                {{ 'CUSTOMER.MENU.CATEGORIES.ALL' | translate }}

            </button>

            @for (cat of categories; track cat.id) {
            <button class="btn btn-sm"
                [class.btn-dark]="selectedCategoryId === cat.id"
                [class.btn-outline-dark]="selectedCategoryId !== cat.id"
                (click)="selectCategory(cat.id)">

                {{ getCategoryName(cat) }}

            </button>
            }

        </div>

        <!-- sort -->
        <div class="d-flex gap-2">

            <button class="sort-btn"
                    [class.active]="sort === 0"
                    (click)="changeSort(0)">

                🔥 {{ 'CUSTOMER.MENU.SORT.DEFAULT' | translate }}

            </button>

            <button class="sort-btn"
                    [class.active]="sort === 1"
                    (click)="changeSort(1)">

                💰 {{ 'CUSTOMER.MENU.SORT.LOW_TO_HIGH' | translate }}

            </button>

            <button class="sort-btn"
                    [class.active]="sort === 2"
                    (click)="changeSort(2)">

                💸 {{ 'CUSTOMER.MENU.SORT.HIGH_TO_LOW' | translate }}

            </button>

        </div>

    </div>

    <!-- items -->
    <div class="row g-3">
        @for (item of items; track item.id) {
        <div class="col-12 col-md-6 col-lg-4">
            <app-customer-menu-item-card [item]="item"></app-customer-menu-item-card>
        </div>
        }
    </div>

    <!-- pagination -->
    <div class="mt-4">
        <app-pagination
            [pageIndex]="pageIndex"
            [pageSize]="pageSize"
            [totalCount]="totalCount"
            (pageChanged)="onPageChange($event)">
        </app-pagination>
    </div>

</div>

<!-- CART BAR -->
<app-cart-bar></app-cart-bar>
