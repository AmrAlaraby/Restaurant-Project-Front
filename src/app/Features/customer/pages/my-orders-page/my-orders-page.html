<!-- Loading -->
@if (loading()) {
  <div class="loading-wrap">
    <div class="spinner"></div>
    <span>{{ 'CUSTOMER.ORDERS.LOADING' | translate }}</span>
  </div>
} @else {

  <div class="page-wrap">

    <app-orders-header />

    @if (activeOrder()) {
      <app-active-order-card
        [order]="activeOrder()"
        (track)="onTrackDelivery($event)">
      </app-active-order-card>
    }

    @if (orders().length > 0) {
      <app-orders-table
        [orders]="orders()"
        (reorder)="reorder($event)">
      </app-orders-table>
    } @else {
      <app-orders-empty-state />
    }

  </div>

}
