<div class="filters-wrapper">

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

    <input
      type="text"
      [placeholder]="'ADMIN.MENU_FILTER.SEARCH' | translate"
      [(ngModel)]="filters.search"
      (ngModelChange)="onFilterChange('search')"
    />
  </div>

  <div class="f-divider"></div>

  <!-- Category -->
  <div class="select-wrap">
    <select [(ngModel)]="filters.categoryId" (ngModelChange)="onFilterChange('categoryId')">
      <option [ngValue]="undefined">
        {{ 'ADMIN.MENU_FILTER.ALL_CATEGORIES' | translate }}
      </option>

      @for (category of categories; track category.id) {
        <option [ngValue]="category.id">
          {{ getCategoryName(category) }}
        </option>
      }
    </select>
  </div>

  <!-- Branch -->
  <div class="select-wrap">
    <select [(ngModel)]="filters.branchId" (ngModelChange)="onFilterChange('branchId')">
      <option [ngValue]="undefined">
        {{ 'ADMIN.MENU_FILTER.ALL_BRANCHES' | translate }}
      </option>

      @for (branch of branches; track branch.id) {
        <option [ngValue]="branch.id">
          {{ getBranchName(branch) }}
        </option>
      }
    </select>
  </div>

  <!-- Availability -->
  <div class="select-wrap">
    <select [(ngModel)]="filters.isAvailable" (ngModelChange)="onFilterChange()">
      <option [ngValue]="undefined">
        {{ 'ADMIN.MENU_FILTER.ALL_STATUS' | translate }}
      </option>

      <option [ngValue]="true">
        {{ 'ADMIN.MENU_FILTER.AVAILABLE' | translate }}
      </option>

      <option [ngValue]="false">
        {{ 'ADMIN.MENU_FILTER.UNAVAILABLE' | translate }}
      </option>
    </select>
  </div>

  <!-- Sort -->
  <div class="select-wrap">
    <select [(ngModel)]="filters.sort" (ngModelChange)="onFilterChange()">
      <option [ngValue]="undefined">
        {{ 'ADMIN.MENU_FILTER.DEFAULT_SORT' | translate }}
      </option>

      <option [ngValue]="1">
        {{ 'ADMIN.MENU_FILTER.PRICE_ASC' | translate }}
      </option>

      <option [ngValue]="2">
        {{ 'ADMIN.MENU_FILTER.PRICE_DESC' | translate }}
      </option>
    </select>
  </div>

  <div class="f-divider"></div>

  <!-- Reset -->
  <button class="reset-btn" (click)="onReset()">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
      <path d="M2 7a5 5 0 1 0 1-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M2 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>

    {{ 'ADMIN.MENU_FILTER.RESET' | translate }}
  </button>

</div>
