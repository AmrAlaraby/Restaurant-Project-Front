<div class="filters-wrapper">

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input
      type="text"
      placeholder="Search menu items..."
      [(ngModel)]="filters.search"
      (ngModelChange)="onFilterChange('search')"
    />
  </div>

  <div class="f-divider"></div>

  <!-- Category -->
  <div class="select-wrap">
    <select [(ngModel)]="filters.categoryId" (ngModelChange)="onFilterChange('categoryId')">
      <option [ngValue]="undefined">All Categories</option>
      @for (category of categories; track category.id) {
        <option [ngValue]="category.id">{{ category.name }}</option>
      }
    </select>
    <svg class="select-arrow" width="12" height="8" viewBox="0 0 14 9" fill="none">
      <path d="M2 2L7 7L12 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Branch -->
  <div class="select-wrap">
    <select [(ngModel)]="filters.branchId" (ngModelChange)="onFilterChange('branchId')">
      <option [ngValue]="undefined">All Branches</option>
      @for (branch of branches; track branch.id) {
        <option [ngValue]="branch.id">{{ branch.name }}</option>
      }
    </select>
    <svg class="select-arrow" width="12" height="8" viewBox="0 0 14 9" fill="none">
      <path d="M2 2L7 7L12 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Availability -->
  <div class="select-wrap">
    <select [(ngModel)]="filters.isAvailable" (ngModelChange)="onFilterChange()">
      <option [ngValue]="undefined">All Status</option>
      <option [ngValue]="true">Available</option>
      <option [ngValue]="false">Unavailable</option>
    </select>
    <svg class="select-arrow" width="12" height="8" viewBox="0 0 14 9" fill="none">
      <path d="M2 2L7 7L12 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Sort -->
  <div class="select-wrap">
    <select [(ngModel)]="filters.sort" (ngModelChange)="onFilterChange()">
      <option [ngValue]="undefined">Default Sort</option>
      <option [ngValue]="1">Price Asc</option>
      <option [ngValue]="2">Price Desc</option>
    </select>
    <svg class="select-arrow" width="12" height="8" viewBox="0 0 14 9" fill="none">
      <path d="M2 2L7 7L12 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="f-divider"></div>

  <!-- Reset -->
  <button class="reset-btn" (click)="onReset()">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
      <path d="M2 7a5 5 0 1 0 1-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M2 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Reset
  </button>

</div>
