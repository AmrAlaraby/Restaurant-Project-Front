<div class="stats-grid">

  <div class="stat-card total">
    <h6>Total Items</h6>
    <h3>{{ stats.totalItems }}</h3>
  </div>

  <div class="stat-card available">
    <h6>Available</h6>
    <h3>{{ stats.availableItems }}</h3>
  </div>

  <div class="stat-card unavailable">
    <h6>Unavailable</h6>
    <h3>{{ stats.unavailableItems }}</h3>
  </div>

</div>
