<div class="stats-grid">

  <div class="stat-card total">
    <h6>{{ 'ADMIN.MENU_ITEMS.TOTAL' | translate }}</h6>
    <h3>{{ stats.totalItems }}</h3>
  </div>

  <div class="stat-card available">
    <h6>{{ 'ADMIN.MENU_ITEMS.AVAILABLE' | translate }}</h6>
    <h3>{{ stats.availableItems }}</h3>
  </div>

  <div class="stat-card unavailable">
    <h6>{{ 'ADMIN.MENU_ITEMS.UNAVAILABLE' | translate }}</h6>
    <h3>{{ stats.unavailableItems }}</h3>
  </div>

</div>
