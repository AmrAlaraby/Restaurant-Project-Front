<div *ngIf="loading" class="loading-state">
  Loading menu items...
</div>

<div *ngIf="!loading && items.length === 0" class="empty-state">
  <h5>No Menu Items Found</h5>
  <p>Try adjusting filters or add a new menu item.</p>
</div>

<div class="items-grid" *ngIf="!loading && items.length > 0">
  @for (item of items; track item.id) {
    <app-menu-item-card
      [item]="item"
      (view)="onView($event)"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      (toggleAvailability)="onToggle($event)"
    />
  }
</div>
