<div class="stations-bar">

  <div class="bar-label">
    {{ 'ADMIN.KITCHEN.STATIONS.ACTIVE' | translate }}
  </div>

  <div class="stations-loading" *ngIf="loading">
    <span class="stations-loading__dot"></span>
    <span class="stations-loading__dot"></span>
    <span class="stations-loading__dot"></span>
    <span class="stations-loading__text">
      {{ 'ADMIN.KITCHEN.STATIONS.LOADING' | translate }}
    </span>
  </div>

  <div class="stations-list" *ngIf="!loading">

    <div
      class="station-chip"
      *ngFor="let s of stations"
      [class.has-pending]="s.pendingCount && s.pendingCount > 0"
    >
      <span class="station-name">{{ s.station }}</span>

      <span
        class="pending-badge"
        *ngIf="s.pendingCount && s.pendingCount > 0"
      >
        {{ s.pendingCount }}
      </span>
    </div>

    <div class="no-stations" *ngIf="stations.length === 0">
      {{ 'ADMIN.KITCHEN.STATIONS.EMPTY' | translate }}
    </div>

  </div>

</div>
