<div class="confirm-overlay" (click)="onOverlayClick($event)">
  <div class="confirm-card">

    <div class="confirm-icon">🗑️</div>

    <h2 class="confirm-title">
      {{ 'ADMIN.BRANCH_DELETE.TITLE' | translate }}
    </h2>

    <p class="confirm-message">
      {{ 'ADMIN.BRANCH_DELETE.MESSAGE_PART_1' | translate }}
      <strong>{{ branchName }}</strong>?
      <br />
      {{ 'ADMIN.BRANCH_DELETE.MESSAGE_PART_2' | translate }}
      <span class="danger-text">⚠️</span>
    </p>

    <div class="confirm-actions">
      <button class="btn-cancel" (click)="cancel()" [disabled]="isDeleting()">
        {{ 'ADMIN.BRANCH_DELETE.CANCEL' | translate }}
      </button>

      <button class="btn-delete" (click)="confirm()" [disabled]="isDeleting()">
        {{
          isDeleting()
            ? ('ADMIN.BRANCH_DELETE.DELETING' | translate)
            : ('ADMIN.BRANCH_DELETE.DELETE' | translate)
        }}
      </button>
    </div>

    <div class="delete-error" *ngIf="deleteError()">
      ⚠️ {{ 'ADMIN.BRANCH_DELETE.ERROR' | translate }}
    </div>

  </div>
</div>
