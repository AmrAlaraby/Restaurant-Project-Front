<div class="branch-create-page">

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <button class="btn-back" (click)="close()">
        <span>←</span> Branches
      </button>
      <h1 class="page-title">New Branch</h1>
    </div>
    <div class="header-actions">
      <button class="btn-cancel" (click)="close()">Cancel</button>
      <button class="btn-save" (click)="submit()" [disabled]="isSaving()">
        {{ isSaving() ? 'Creating...' : '✚ Create Branch' }}
      </button>
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-card" [formGroup]="form">

    <!-- Section: Basic Info -->
    <div class="section">
      <h3 class="section-title">📋 Basic Info</h3>
      <hr class="divider" />
      <div class="form-grid">

        <div class="field-group full-width">
          <label class="field-label">Branch Name <span class="required">*</span></label>
          <input class="field-input" type="text" formControlName="name" placeholder="e.g. Downtown Branch" />
          <span class="field-error" *ngIf="isInvalid('name')">Branch name is required.</span>
        </div>

        <div class="field-group">
          <label class="field-label">Phone <span class="required">*</span></label>
          <input class="field-input" type="text" formControlName="phone" placeholder="e.g. +20 100 000 0000" />
          <span class="field-error" *ngIf="isInvalid('phone')">Phone number is required.</span>
        </div>

        <div class="field-group">
          <label class="field-label">Special Mark <span class="optional">(optional)</span></label>
          <input class="field-input" type="text" formControlName="specialMark" placeholder="e.g. Near the mall" />
        </div>

        <div class="field-group full-width">
          <label class="field-label">Note <span class="optional">(optional)</span></label>
          <textarea class="field-input field-textarea" formControlName="note" rows="3" placeholder="Any additional notes..."></textarea>
        </div>

      </div>
    </div>

    <!-- Section: Address -->
    <div class="section">
      <h3 class="section-title">📍 Address</h3>
      <hr class="divider" />
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label">Building Number <span class="required">*</span></label>
          <input class="field-input" type="number" formControlName="buildingNumber" placeholder="e.g. 12" />
          <span class="field-error" *ngIf="isInvalid('buildingNumber')">Building number is required.</span>
        </div>

        <div class="field-group">
          <label class="field-label">Street <span class="required">*</span></label>
          <input class="field-input" type="text" formControlName="street" placeholder="e.g. Tahrir St." />
          <span class="field-error" *ngIf="isInvalid('street')">Street is required.</span>
        </div>

        <div class="field-group">
          <label class="field-label">City <span class="required">*</span></label>
          <input class="field-input" type="text" formControlName="city" placeholder="e.g. Cairo" />
          <span class="field-error" *ngIf="isInvalid('city')">City is required.</span>
        </div>

      </div>
    </div>

  </div>

  <!-- Save Error -->
  <div class="save-error" *ngIf="saveError()">
    ⚠️ {{ saveError() }}
  </div>

</div>
