@if (isOpen) {
  <div class="modal-backdrop">
    <div class="modal-box">

      <p>{{ message | translate }}</p>

      <div class="actions">

        @if (!isError) {
          <button (click)="onConfirm()">
            {{ 'ADMIN.TABLES.MODAL.YES' | translate }}
          </button>

          <button (click)="onCancel()">
            {{ 'ADMIN.TABLES.MODAL.CANCEL' | translate }}
          </button>

        } @else {

          <button (click)="onCancel()">
            {{ 'ADMIN.TABLES.MODAL.OK' | translate }}
          </button>

        }

      </div>

    </div>
  </div>
}
