@if (isOpen) {
  <div class="modal-backdrop">
    <div class="modal-box">

      <div class="modal-icon-wrap">
        <div class="icon-circle" [class.is-error]="isError" [class.is-confirm]="!isError">
          @if (isError) {
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M12 8v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          } @else {
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M4 6h16M8 6V4h8v2M10 11v5M14 11v5M5 6l1 14h12L19 6"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
        </div>
      </div>

      <p>{{ message | translate }}</p>

      <div class="actions">
        @if (!isError) {
          <button class="btn-confirm" (click)="onConfirm()">
            {{ 'ADMIN.TABLES.MODAL.YES' | translate }}
          </button>
          <button class="btn-cancel" (click)="onCancel()">
            {{ 'ADMIN.TABLES.MODAL.CANCEL' | translate }}
          </button>
        } @else {
          <button class="btn-confirm" (click)="onCancel()">
            {{ 'ADMIN.TABLES.MODAL.OK' | translate }}
          </button>
        }
      </div>

    </div>
  </div>
}
