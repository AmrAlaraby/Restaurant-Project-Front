<div class="filter-container">

  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

    <input
      type="text"
      [placeholder]="'ADMIN.TABLES.FILTER.SEARCH_PLACEHOLDER' | translate"
      [(ngModel)]="search"
      (ngModelChange)="onSearchChange($event)"
    />
  </div>

  <div class="divider"></div>

  <!-- Branch -->
  <select [(ngModel)]="branchId" (ngModelChange)="onFilterChange()">
    <option [ngValue]="null">
      {{ 'ADMIN.TABLES.FILTER.ALL_BRANCHES' | translate }}
    </option>

    @for (branch of branches; track branch.id) {
      <option [ngValue]="branch.id">
        {{ getBranchName(branch) }}
      </option>
    }
  </select>

  <!-- Status -->
  <select
    [(ngModel)]="isOccupied"
    (ngModelChange)="onFilterChange()"
    [class.occupied]="isOccupied === true"
    [class.available]="isOccupied === false"
  >
    <option [ngValue]="null">
      {{ 'ADMIN.TABLES.FILTER.ALL_STATUS' | translate }}
    </option>

    <option [ngValue]="true">
      {{ 'ADMIN.TABLES.FILTER.OCCUPIED' | translate }}
    </option>

    <option [ngValue]="false">
      {{ 'ADMIN.TABLES.FILTER.AVAILABLE' | translate }}
    </option>
  </select>

  <div class="divider"></div>

  <button class="reset-btn" (click)="resetFilters()">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
      <path d="M2 7a5 5 0 1 0 1-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M2 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    {{ 'ADMIN.TABLES.FILTER.RESET' | translate }}
  </button>

</div>
