<div
  class="table-card"
  [class.occupied]="table.isOccupied"
  [class.available]="!table.isOccupied"
  (click)="onOpenOrder()"
>
  <div class="card-center">
    <h3>{{ table.tableNumber }}</h3>

    @if (table.isOccupied) {
      <span class="badge-pill badge-occupied">
        <span class="badge-dot"></span>Occupied
      </span>
    } @else {
      <span class="badge-pill badge-available">
        <span class="badge-dot"></span>Available
      </span>
    }

    <span class="cap-info">Cap: {{ table.capacity }}</span>
  </div>

  <div class="card-actions" (click)="$event.stopPropagation()">
    <button class="btn-toggle" (click)="onToggle()">
      @if (table.isOccupied) { Free } @else { Occupy }
    </button>
    <button class="btn-edit" (click)="onEdit()">Edit</button>
    <button class="btn-del" (click)="onDelete()">Delete</button>
  </div>
</div>
