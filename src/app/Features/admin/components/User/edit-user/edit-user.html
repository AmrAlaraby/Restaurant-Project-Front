<div class="modal-backdrop">

  <div class="edit-user-modal">

    <!-- Header -->
    <div class="modal-header">
      <h3>{{ 'ADMIN.USERS.EDIT.TITLE' | translate }}</h3>
      <button class="btn-close" (click)="onClose()">×</button>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <div class="form-row">
        <!-- Name -->
        <div class="form-group">
          <label>{{ 'ADMIN.USERS.EDIT.FIELDS.NAME' | translate }}</label>
          <input
            type="text"
            [placeholder]="'ADMIN.USERS.EDIT.PLACEHOLDERS.NAME' | translate"
            [(ngModel)]="editedUser.name" />
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>{{ 'ADMIN.USERS.EDIT.FIELDS.EMAIL' | translate }}</label>
          <input
            type="email"
            [placeholder]="'ADMIN.USERS.EDIT.PLACEHOLDERS.EMAIL' | translate"
            [(ngModel)]="editedUser.email" />
        </div>
      </div>

      <div class="form-row">
        <!-- Role -->
        <div class="form-group">
          <label>{{ 'ADMIN.USERS.EDIT.FIELDS.ROLE' | translate }}</label>
          <select [(ngModel)]="editedUser.roleId">
            <option value="" disabled>
              {{ 'ADMIN.USERS.EDIT.PLACEHOLDERS.ROLE' | translate }}
            </option>
            @for (role of roles; track role) {
              <option [ngValue]="role">{{ role }}</option>
            }
          </select>
        </div>

        <!-- Branch -->
        <div class="form-group">
          <label>{{ 'ADMIN.USERS.EDIT.FIELDS.BRANCH' | translate }}</label>
          <select [(ngModel)]="editedUser.branchId">
            <option [ngValue]="undefined">
              {{ 'ADMIN.USERS.EDIT.PLACEHOLDERS.NO_BRANCH' | translate }}
            </option>
            @for (branch of branches; track branch.id) {
              <option [ngValue]="branch.id">{{ getItemName(branch) }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Error -->
      @if (errorMessage) {
        <div class="error-message">{{ errorMessage }}</div>
      }

    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn-cancel" (click)="onClose()">
        {{ 'ADMIN.USERS.EDIT.BUTTONS.CANCEL' | translate }}
      </button>

      <button class="btn-save" (click)="onSave()" [disabled]="isSubmitting">
        {{ isSubmitting
          ? ('ADMIN.USERS.EDIT.BUTTONS.SAVING' | translate)
          : ('ADMIN.USERS.EDIT.BUTTONS.SAVE' | translate)
        }}
      </button>
    </div>

  </div>

</div>
