<div class="modal-backdrop">

  <div class="add-user-modal">

    <!-- Header -->
    <div class="modal-header">
      <h3>Add New User</h3>
      <button class="btn-close" (click)="onClose()">×</button>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <div class="form-row">
        <!-- Name -->
        <div class="form-group">
          <label>FULL NAME</label>
          <input
            type="text"
            placeholder="Ahmed Hassan"
            [(ngModel)]="user.name" />
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>EMAIL</label>
          <input
            type="email"
            placeholder="ahmed@rms.com"
            [(ngModel)]="user.email" />
        </div>
      </div>

      <div class="form-row">
        <!-- Role -->
        <div class="form-group">
          <label>ROLE</label>
          <select [(ngModel)]="user.roleId">
            <option value="" disabled>Select role</option>
            @for (role of roles; track role) {
              <option [ngValue]="role">{{ role }}</option>
            }
          </select>
        </div>

        <!-- Branch -->
        <div class="form-group">
          <label>BRANCH</label>
          <select [(ngModel)]="user.branchId">
            <option [ngValue]="undefined">No Branch</option>
            @for (branch of branches; track branch.id) {
              <option [ngValue]="branch.id">{{ branch.name }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Error -->
      @if (errorMessage) {
        <div class="error-message">{{ errorMessage }}</div>
      }

    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn-cancel" (click)="onClose()">Cancel</button>
      <button class="btn-save" (click)="onSave()" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Create User' }}
      </button>
    </div>

  </div>

</div>
