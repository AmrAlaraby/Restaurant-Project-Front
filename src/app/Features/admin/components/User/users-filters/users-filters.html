<div class="filters">

  <!-- Roles -->
  <div class="roles">
    @for (role of roles; track role) {
      <button
        (click)="selectRole(role)"
        [class.active]="role === selectedRole"
      >
        {{ role }}
      </button>
    }
  </div>

  <!-- Branches -->
  <div class="branches">
    <select [(ngModel)]="selectedBranchId" (ngModelChange)="selectBranch($event)">
      <option [ngValue]="null">All Branches</option>
      @for (branch of branches; track branch.id) {
        <option [ngValue]="branch.id">{{ branch.name }}</option>
      }
    </select>
  </div>

  <!-- Status -->
  <div class="status">
    <button
      (click)="selectStatus(true)"
      [class.active]="isActive"
    >
      Active
    </button>

    <button
      (click)="selectStatus(false)"
      [class.active]="!isActive"
    >
      Inactive
    </button>
  </div>

</div>
