<div class="ingredients-container">

  <!-- Header -->
  <div class="header">
      <div class="page-header">
      
        <!-- <h1 class="page-title">Stock Management</h1> -->

        <h2 class=".page-title">Ingredients</h2>
      </div>
   

    <div class="actions-header">
      <button type="button" class="btn add" (click)="openModal()">
        + Add Item
      </button>

      <div class="count" *ngIf="!loading">
        {{ totalCount }} Items
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">
    <p>Loading ingredients...</p>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && ingredients.length == 0" class="empty">
    <p>No ingredients found 🍃</p>
  </div>

  <!-- Table -->
  <div class="table-wrapper" *ngIf="!loading && ingredients.length > 0">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Unit</th>
          <th class="actions">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of ingredients; let i = index">
          <td>{{ (pageIndex - 1) * pageSize + i + 1 }}</td>

          <td class="name">
            <span class="avatar">{{ item.name[0] }}</span>
            {{ item.name }}
          </td>

          <td>
            <span class="badge">{{ item.unit }}</span>
          </td>

          <td class="actions">
            <button class="btn delete" (click)="delete(item.id)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <app-pagination
    *ngIf="!loading && totalCount > pageSize"
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    [totalCount]="totalCount"
    (pageChanged)="onPageChange($event)">
  </app-pagination>

</div>

<!-- Modal OUTSIDE container -->
<div class="modal-backdrop" *ngIf="showModal">
  <div class="modal-ingredient">

    <h3>Add New Ingredient</h3>

    <form (ngSubmit)="addIngredient()">

      <div class="form-group">
        <label>Name</label>
        <input
          type="text"
          [(ngModel)]="newIngredient.name"
          name="name"
          required
        />
      </div>

      <div class="form-group">
        <label>Arabic Name</label>
        <input
          type="text"
          [(ngModel)]="newIngredient.arabicName"
          name="arabicName"
          required
        />
      </div>

      <div class="form-group">
        <label>Unit</label>
        <input
          type="text"
          [(ngModel)]="newIngredient.unit"
          name="unit"
          required
        />
      </div>

      <div class="modal-actions">
        <button type="button" class="btn cancel" (click)="closeModal()">
          Cancel
        </button>

        <button type="submit" class="btn save">
          Save
        </button>
      </div>

    </form>

  </div>
</div>
