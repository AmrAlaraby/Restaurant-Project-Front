<div class="branch-selector">
  <select (change)="selectBranch($any($event.target).value)">
    <option value="">{{ 'ADMIN.PAYMENT.TRANSACTIONS.BRANCHES.ALL' | translate }}</option>
    <option *ngFor="let branch of branches" [value]="branch.id">
      {{ getBranchName(branch) }}
    </option>
  </select>
</div>
