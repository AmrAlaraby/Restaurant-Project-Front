<users-header (addUser)="onAddUser()"></users-header>


<users-filters
  (roleChanged)="onRoleChange($event)"
  (statusChanged)="onStatusChange($event)">
</users-filters>


@for (user of users; track user.id) {
  <user-card
    [user]="user"
    (edit)="onEditUser(user)"
    (toggle)="onToggleUser(user.id)">
  </user-card>
}


<users-list
  [users]="users"
  (edit)="onEditUser($event)"
  (toggle)="onToggleUser($event)">
</users-list>
