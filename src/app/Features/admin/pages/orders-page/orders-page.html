<div class="page">

  <!-- Breadcrumb -->
  <!-- <div class="breadcrumb">{{ 'ADMIN.ORDERS.BREADCRUMB' | translate }}</div> -->

  <!-- Header -->
  <div class="page-header">
    <h1>{{ 'ADMIN.ORDERS.TITLE' | translate }}</h1>

    <button class="btn-new" (click)="openModal()">
      {{ 'ADMIN.ORDERS.NEW_ORDER' | translate }}
    </button>
  </div>

  <!-- Stats -->
  <app-order-stats [orders]="orders"></app-order-stats>

  <!-- Filters -->
  <app-order-filters [branches]="branches" (filterChange)="onFilterChange($event)"></app-order-filters>

  <!-- Table -->
  <app-order-table [orders]="orders" (view)="openOrder($event)"></app-order-table>

  <!-- Pagination -->
   <app-pagination
    [pageSize]="filters.pageSize"
    [pageIndex]="filters.pageIndex"
    [totalCount]="totalCount"
    (pageChanged)="onPageChange($event)"></app-pagination>
  <!-- <app-order-pagination
    [total]="totalCount"
    [pageIndex]="filters.pageIndex"
    [pageSize]="filters.pageSize"
    (pageChange)="onPageChange($event)">
  </app-order-pagination> -->

</div>

<!-- Modal -->
 @if (showDetailsModal) {
 <app-order-details
  [orderId]="selectedOrderId"
  (close)="closeOrderModal()">
</app-order-details>}
 @if (showModal) {
<app-order-modal
  [branches]="branches"
  (close)="closeModal()">
</app-order-modal>
}
