<div class="menu-items-page">
  <div class="page-header">
    <div>
      <h2>Menu Items Management</h2>
    </div>

    <button class="btn-add" (click)="onAddNew()">+ Add New Item</button>
  </div>

  <app-menu-items-stats [stats]="stats" />

  <app-menu-items-filters [categories]="categories" [filters]="filters" [branches]="branches"
    (filtersChanged)="onFiltersChanged($event)" (resetClicked)="resetFilters()" />

  <app-menu-items-grid [items]="menuItems" [loading]="loading" (view)="onView($event)" (edit)="onEdit($event)"
    (delete)="onDelete($event)" (toggleAvailability)="onToggleAvailability($event)" />

  <app-pagination [pageIndex]="filters.pageIndex!" [pageSize]="filters.pageSize!" [totalCount]="totalCount"
    (pageChanged)="onPageChanged($event)" />
</div>

<div class="custom-backdrop" *ngIf="isAnyModalOpen()"></div>

<!-- ================= FORM MODAL ================= -->
<div class="custom-modal" *ngIf="showFormModal">
  <div class="modal-box large">
    <div class="modal-header custom-modal-header">
      <div>
        <h5 class="modal-title">
          {{ isEditMode ? 'Edit Menu Item' : 'Create Menu Item' }}
        </h5>
        <small>
          {{ isEditMode ? 'Update menu item information' : 'Add a new item to your menu' }}
        </small>
      </div>

      <button class="btn-close" (click)="closeFormModal()"></button>
    </div>

    <div class="modal-body">
      <app-menu-item-form [isEditMode]="isEditMode" [menuItemId]="selectedMenuItemId" (cancelled)="closeFormModal()"
        (formSubmitted)="handleFormSubmitted()" />
    </div>
  </div>
</div>

<!-- ================= DELETE MODAL ================= -->
<div class="custom-modal" *ngIf="showDeleteModal">
  <div class="modal-box small">
    <div class="modal-header">
      <h5 class="text-danger">Delete Menu Item</h5>
      <button class="btn-close" (click)="closeDeleteModal()"></button>
    </div>

    <div class="modal-body">
      <p>
        Are you sure you want to delete this menu item?
        This action cannot be undone.
      </p>
    </div>

    <div class="modal-footer">
      <button class="btn btn-light" (click)="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" (click)="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- ================= DETAILS MODAL ================= -->
<div class="custom-modal" *ngIf="showDetailsModal && selectedMenuItemDetails">
  <div class="modal-box large">
    <div class="modal-header">
      <h5>Menu Item Details</h5>
      <button class="btn-close" (click)="closeDetailsModal()"></button>
    </div>

    <div class="modal-body">
      <app-menu-item-details [menuItem]="selectedMenuItemDetails" />
    </div>
  </div>
</div>
