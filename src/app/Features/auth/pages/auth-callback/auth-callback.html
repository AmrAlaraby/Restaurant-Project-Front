<div class="callback-wrapper">

  <div class="callback-card">

    <!-- Loader -->
    <div class="loader"></div>

    <!-- Title -->
    <h2>
      {{ 'AUTH.CALLBACK.TITLE' | translate }}
    </h2>

    <!-- Subtitle -->
    <p>
      {{ 'AUTH.CALLBACK.SUBTITLE' | translate }}
    </p>

    <!-- Steps -->
    <div class="steps">

      <div class="step active">
        <span class="dot"></span>
        <span>
          {{ 'AUTH.CALLBACK.STEPS.AUTHENTICATING' | translate }}
        </span>
      </div>

      <div class="step">
        <span class="dot"></span>
        <span>
          {{ 'AUTH.CALLBACK.STEPS.VERIFYING' | translate }}
        </span>
      </div>

      <div class="step">
        <span class="dot"></span>
        <span>
          {{ 'AUTH.CALLBACK.STEPS.REDIRECTING' | translate }}
        </span>
      </div>

    </div>

  </div>

</div>
