<div class="callback-wrapper">

  <div class="callback-card">

    <!-- Loader -->
    <div class="loader"></div>

    <!-- Title -->
    <h2>Signing you in</h2>

    <!-- Subtitle -->
    <p>Please wait while we securely log you into your account</p>

    <!-- Steps -->
    <div class="steps">

      <div class="step active">
        <span class="dot"></span>
        <span>Authenticating</span>
      </div>

      <div class="step">
        <span class="dot"></span>
        <span>Verifying account</span>
      </div>

      <div class="step">
        <span class="dot"></span>
        <span>Redirecting</span>
      </div>

    </div>

  </div>

</div>
