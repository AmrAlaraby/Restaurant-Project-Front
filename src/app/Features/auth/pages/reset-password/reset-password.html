<div class="reset-container">

  <div class="reset-card">

    <div class="header">
      <div class="icon">🔐</div>
      <h2>{{ 'AUTH.RESET.TITLE' | translate }}</h2>
      <p>{{ 'AUTH.RESET.SUBTITLE' | translate }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Password -->
      <div class="form-group">
        <label>{{ 'AUTH.RESET.NEW_PASSWORD' | translate }}</label>

        <div class="input-box">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            [placeholder]="'AUTH.RESET.PLACEHOLDER_PASSWORD' | translate"
          />

          <button type="button" (click)="togglePassword()">
            👁
          </button>
        </div>

        <!-- Strength -->
        <div class="strength">
          <div class="bar">
            <div class="fill" [style.width.%]="strength"></div>
          </div>
          <span>
            {{ 'AUTH.RESET.STRENGTH' | translate:{ value: strength } }}
          </span>
        </div>

      </div>

      <!-- Confirm -->
      <div class="form-group">
        <label>{{ 'AUTH.RESET.CONFIRM_PASSWORD' | translate }}</label>

        <input
          type="password"
          formControlName="confirmPassword"
          [placeholder]="'AUTH.RESET.PLACEHOLDER_CONFIRM' | translate"
        />
      </div>

      <!-- Error -->
      @if(error){
        <div class="error">{{ error }}</div>
      }

      <!-- Success -->
      @if(success){
        <div class="success">{{ success }}</div>
      }

      <!-- Button -->
      <button class="btn" [disabled]="loading || form.invalid">
        @if(!loading){
          {{ 'AUTH.RESET.BUTTON' | translate }}
        } @else {
          {{ 'AUTH.RESET.PROCESSING' | translate }}
        }
      </button>

    </form>

    <div class="footer">
      <a routerLink="/login">
        ← {{ 'AUTH.RESET.BACK' | translate }}
      </a>
    </div>

  </div>

</div>
