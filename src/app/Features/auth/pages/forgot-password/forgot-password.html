<div class="auth-card">

  <h2 class="form-title">
    {{ 'AUTH.FORGOT_PASSWORD.TITLE' | translate }}
  </h2>

  <p class="form-subtitle">
    {{ 'AUTH.FORGOT_PASSWORD.SUBTITLE' | translate }}
  </p>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="form-group">
      <input
        type="email"
        class="form-input"
        formControlName="email"
        [placeholder]="'AUTH.FORGOT_PASSWORD.EMAIL_PLACEHOLDER' | translate"
      />
    </div>

    @if(message){
      <div class="server-error">
        {{ message }}
      </div>
    }

    <button class="btn-submit" [disabled]="isSubmitting">
      @if(isSubmitting){
        <span>{{ 'AUTH.FORGOT_PASSWORD.SENDING' | translate }}</span>
      } @else {
        <span>{{ 'AUTH.FORGOT_PASSWORD.SEND' | translate }}</span>
      }
    </button>

  </form>

</div>
