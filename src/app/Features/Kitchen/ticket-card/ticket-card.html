<div class="ticket-card" [class]="'status-' + ticket.status">
  <div class="ticket-header">
    <div class="ticket-id">#{{ ticket.id }}</div>
    <div class="status-badge" [class]="'badge-' + ticket.status">{{ statusLabel }}</div>
  </div>

  <div class="ticket-meta">
    <div class="meta-row">
      <span class="meta-label">ORDER</span>
      <span class="meta-value">#{{ ticket.orderId }}</span>
    </div>
    <div class="meta-row">
      <span class="meta-label">STATION</span>
      <span class="meta-value station-name">{{ ticket.station }}</span>
    </div>
    <div class="meta-row" *ngIf="ticket.startedAt">
      <span class="meta-label">STARTED</span>
      <span class="meta-value">{{ ticket.startedAt | date: 'HH:mm' }}</span>
    </div>
    <div class="meta-row" *ngIf="ticket.completedAt">
      <span class="meta-label">DONE</span>
      <span class="meta-value">{{ ticket.completedAt | date: 'HH:mm' }}</span>
    </div>
    <div class="meta-row" *ngIf="elapsedMinutes !== null">
      <span class="meta-label">TIME</span>
      <span class="meta-value" [class.time-warn]="elapsedMinutes > 15 && ticket.status !== 2">
        {{ elapsedMinutes }}m
      </span>
    </div>
  </div>

  <div class="ticket-actions">
    <button class="btn-details" (click)="onDetails()">Details</button>
    <button
      *ngIf="nextStatus !== null"
      class="btn-advance"
      (click)="onAdvance()"
    >
      {{ nextStatusLabel }}
    </button>
  </div>
</div>
