<div class="stats-grid">

  <div class="stat-card border-red">
    <div class="stat-value red">{{ tablesServed }}</div>
    <div class="stat-label">Tables Served</div>
  </div>

  <div class="stat-card border-orange">
    <div class="stat-value orange">{{ activeOrders }}</div>
    <div class="stat-label">Orders Active</div>
  </div>

  <div class="stat-card border-red">
    <div class="stat-value red">{{ occupiedTables }}</div>
    <div class="stat-label">Occupied Tables</div>
  </div>

  <div class="stat-card border-green">
    <div class="stat-value green">EGP {{ myOrdersTotal | number }}</div>
    <div class="stat-label">My Orders Total</div>
  </div>

</div>
