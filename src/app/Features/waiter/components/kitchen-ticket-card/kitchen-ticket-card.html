<div class="card card--ready">
  <!-- Top row: ticket info + status badge -->
  <div class="card__header">
    <div class="card__meta">
      <span class="card__ticket-ref">
        #T-{{ ticket.id.toString().padStart(3, '0') }} · {{ ticket.station }}
      </span>
      <h3 class="card__order-title">Order #{{ ticket.orderId }}</h3>
    </div>

    <div class="card__status-badge badge--ready">
      <span class="badge__label">READY — SERVE NOW!</span>
      <span class="badge__icon">🔔</span>
    </div>
  </div>

  <!-- Items row -->
  <div class="card__items">
    <span class="item-chip">
      <span class="item-emoji">{{ stationEmoji }}</span>
      <span class="item-label">{{ ticket.station }} items</span>
    </span>
  </div>

  <!-- Action -->
  <div class="card__actions">
    <button class="btn btn--success" [disabled]="confirming" (click)="onConfirmServed()">
      {{ confirming ? 'Confirming...' : '✓ Confirm Served' }}
    </button>
  </div>
</div>
