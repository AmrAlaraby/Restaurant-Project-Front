<div class="tables">

  <div class="table-card"
       *ngFor="let t of tables"
       [class.busy]="t.isOccupied"
       [class.free]="!t.isOccupied">

    <h3>T{{ t.tableNumber }}</h3>

    <span *ngIf="t.isOccupied">BUSY</span>
    <span *ngIf="!t.isOccupied">FREE</span>

    <p>Cap: {{ t.capacity }}</p>

  </div>

</div>
