<div class="categories">

  <!-- ALL -->
  <button
    class="cat-btn"
    [class.active]="isActive(undefined)"
    (click)="onSelect(undefined)">
    All
  </button>

  <!-- DYNAMIC CATEGORIES -->
   @for(c of categories; track $index ){
  <button
    class="cat-btn"
    [class.active]="isActive(c.id)"
    (click)="onSelect(c.id)">
    {{ c.name }}
  </button>}

</div>
