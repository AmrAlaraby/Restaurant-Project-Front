<div class="categories">

  <!-- ALL -->
  <button
    class="cat-btn"
    [class.active]="isActive(undefined)"
    (click)="onSelect(undefined)">
    {{ 'WAITER.ORDERS.FILTERS.STATUS.ALL' | translate }}
  </button>

  <!-- DYNAMIC CATEGORIES -->
   @for(c of categories; track $index ){
  <button
    class="cat-btn"
    [class.active]="isActive(c.id)"
    (click)="onSelect(c.id)">
    {{ getCategoryName(c) }}
  </button>}

</div>
