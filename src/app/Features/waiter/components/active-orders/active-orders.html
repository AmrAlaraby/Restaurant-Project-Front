<div class="orders-list">

  <div class="order-card" *ngFor="let order of orders" [ngClass]="'border-' + getStatusColor(order.status)">

    <div class="order-top">
      <div class="order-title">
        #{{ order.id }} · Table {{ order.tableNumber }} · {{ order.itemsCount }} guests
      </div>
      <span class="status-badge" [ngClass]="'badge-' + getStatusColor(order.status)">
        {{ order.status?.toUpperCase() }}
      </span>
    </div>

    <div class="order-items">
      <span *ngFor="let item of getPreviewItems(order); let last = last">
        {{ item }}<span *ngIf="!last"> · </span>
      </span>
    </div>

    <div class="order-footer">
      <span class="order-meta">
        🕐 Ordered {{ order.orderedAt ?? 'Just now' }} · EGP {{ order.totalAmount }}
      </span>
    </div>

  </div>

  <div class="empty-orders" *ngIf="orders.length === 0">
    <span>🎉</span>
    <p>No active orders right now</p>
  </div>

</div>
