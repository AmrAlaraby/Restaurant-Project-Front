<div class="page">

  <div class="header">
    <h2>Place New Order</h2>
  </div>

  <div class="layout">

    <!-- LEFT SIDE -->
    <div class="left-panel">

      <div class="card">
        <app-category-filter
        [categories]="categories"
        (select)="onCategoryChange($event)"
          ></app-category-filter>
      </div>

      <div class="card menu-card">
        <app-menu-list
          [items]="menuItems"
          [pageIndex]="pageIndex"
          [pageSize]="pageSize"
          [totalCount]="totalCount"
          (pageChanged)="onPageChange($event)"
          (add)="addToOrder($event)">
        </app-menu-list>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

      <div class="card">
        <app-table-selector></app-table-selector>
      </div>

      <div class="card">
        <app-order-summary
        [items]="orderItems"
        [total]="total"
        (remove)="removeItem($event)"
        (decrease)="decreaseQty($event)">
        </app-order-summary>
      </div>

      <div class="card">
        <app-payment-selector></app-payment-selector>
      </div>

    </div>

  </div>

</div>
