<div class="kitchen-page">
  <div class="page-header">
    <h1 class="page-title">Kitchen Status</h1>
    <p class="page-subtitle">Orders ready to be served</p>
  </div>

  @if (loading) {
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Loading orders...</span>
    </div>
  }

  @if (!loading && board) {
    <div class="tickets-list">
      @for (ticket of board.done; track ticket.id) {
        <app-kitchen-ticket-card [ticket]="ticket" (confirmServed)="onConfirmServed($event)" />
      }

      @if (board.done.length === 0) {
        <div class="empty-state">
          <span class="empty-icon">🍽️</span>
          <p>No orders ready to serve</p>
        </div>
      }
    </div>
  }
</div>
