<div class="home-page">

  <!-- ── Top Bar ──────────────────────────────────────── -->
  <header class="top-bar">
    <div>
      <h1 class="greeting">
        {{ 'WAITER.HOME.GREETING' | translate:{ name: waiterName } }}
      </h1>

      <p class="sub-info">
        {{ getbranchName(branchNames) }}
      </p>
    </div>

    <button class="new-order-btn" (click)="goToNewOrder()">
      {{ 'WAITER.HOME.NEW_ORDER' | translate }}
    </button>
  </header>

  <!-- ── Stats ─────────────────────────────────────────── -->
  <app-stats-cards
    [tablesServed]="tablesServed"
    [activeOrders]="activeOrdersCount"
    [occupiedTables]="occupiedCount"
    [myOrdersTotal]="myOrdersTotal">
  </app-stats-cards>

  <!-- ── Ready Alert ───────────────────────────────────── -->
  <app-ready-alert
    *ngIf="readyOrders.length > 0"
    [readyOrders]="readyOrders"
    (viewKitchen)="goToKitchen()">
  </app-ready-alert>

  <!-- ── My Tables ─────────────────────────────────────── -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">
        {{ 'WAITER.HOME.MY_TABLES' | translate }}
      </h2>

      <button class="link-btn" (click)="goToTables()">
        {{ 'WAITER.HOME.FULL_FLOOR' | translate }}
      </button>
    </div>

    <app-tables-grid [tables]="displayedTables"></app-tables-grid>
  </section>

  <!-- ── Active Orders ─────────────────────────────────── -->
  <section class="section">
    <h2 class="section-title">
      {{ 'WAITER.HOME.ACTIVE_ORDERS' | translate }}
    </h2>

    <app-active-orders [orders]="activeOrders"></app-active-orders>
  </section>

</div>
