<div class="home-header">

  <div class="welcome">
    <h2>Welcome  , {{ waiterName }}</h2>
  </div>

  <div class="branch-info" *ngIf="branchName">
    <span class="label">Branch {{branchId}} — </span>
    <span class="branch-name">{{ branchName }}</span>
  </div>

</div>

<div class="page">

  <!-- Stats -->
  <app-stats-cards
    [occupied]="occupiedCount"
    [orders]="activeOrdersCount">
  </app-stats-cards>

  <!-- Active Orders (NOW ABOVE TABLES) -->
  <h2 class="section-title">Active Orders</h2>

  <!-- Tables -->
  <div class="tables-header">
    <h3>Tables</h3>

    <button class="view-all-btn" (click)="goToTables()">
      View All →
    </button>
  </div>

  <app-tables-grid [tables]="displayedTables"></app-tables-grid>

</div>
