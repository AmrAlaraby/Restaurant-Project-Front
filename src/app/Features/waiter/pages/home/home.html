<div class="home-page">

  <!-- ── Top Bar ──────────────────────────────────────── -->
  <header class="top-bar">
    <div>
      <h1 class="greeting">Good morning, {{ waiterName }} </h1>
      <p class="sub-info">
        {{ branchName }}
      </p>
    </div>
    <button class="new-order-btn" (click)="goToNewOrder()">
      + New Order
    </button>
  </header>

  <!-- ── Stats ─────────────────────────────────────────── -->
  <app-stats-cards
    [tablesServed]="tablesServed"
    [activeOrders]="activeOrdersCount"
    [occupiedTables]="occupiedCount"
    [myOrdersTotal]="myOrdersTotal">
  </app-stats-cards>

  <!-- ── Ready Alert ───────────────────────────────────── -->
  <app-ready-alert
    *ngIf="readyOrders.length > 0"
    [readyOrders]="readyOrders"
    (viewKitchen)="goToKitchen()">
  </app-ready-alert>

  <!-- ── My Tables ─────────────────────────────────────── -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">My Tables</h2>
      <button class="link-btn" (click)="goToTables()">Full Floor View →</button>
    </div>
    <app-tables-grid [tables]="displayedTables"></app-tables-grid>
  </section>

  <!-- ── Active Orders ─────────────────────────────────── -->
  <section class="section">
    <h2 class="section-title">Active Orders</h2>
    <app-active-orders [orders]="activeOrders"></app-active-orders>
  </section>

</div>
