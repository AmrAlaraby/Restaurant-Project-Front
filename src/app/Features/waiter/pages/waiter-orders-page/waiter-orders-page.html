<div class="page">

  <div class="header">
    <div>
      <h2>{{ 'WAITER.ORDERS.TITLE' | translate }}</h2>
      <p class="sub">
        {{ 'WAITER.ORDERS.SUBTITLE' | translate }}
      </p>
    </div>

    <button class="new-order-btn" (click)="goToNewOrder()">
      {{ 'WAITER.ORDERS.BUTTON_NEW_ORDER' | translate }}
    </button>
  </div>

  <app-waiter-order-filters
    [hideTypeFilter]="true"
    (filtersChanged)="onFiltersChanged($event)">
  </app-waiter-order-filters>

  <app-waiter-orders-list
    [orders]="orders"
    (orderClicked)="onOrderClicked($event)"
    (addItemClicked)="onAddItemClicked($event)">
  </app-waiter-orders-list>

  <app-pagination
    [pageIndex]="filters.pageIndex"
    [pageSize]="filters.pageSize"
    [totalCount]="totalCount"
    (pageChanged)="onPageChanged($event)">
  </app-pagination>

  @if (isModalOpen) {
    <app-order-details
      [orderId]="selectedOrderId"
      (close)="closeModal()">
    </app-order-details>
  }

</div>
