<div class="layout">

  <!-- SIDEBAR -->
  <app-sidebar
    [sections]="sidebarData"
    [class.open]="isOpen"
    prefix="waiter"
    [isOpen]="isOpen"
    [AvatarLetters]="AvatarLetters"
    [UserName]="UserName"
    [UserRole]="UserRole"
    (close)="closeSidebar()">
  </app-sidebar>

  <!-- CONTENT -->
  <div class="app-shell">

    <!-- TOPBAR -->
    <header class="topbar">

      <button class="hamburger" (click)="openSidebar()">
        ☰
      </button>

      <div class="title">
        {{ 'WAITER.LAYOUT.TOPBAR.TITLE.' + (topbarTitleKey || 'DEFAULT') | translate }}
      </div>

      <div class="topbar-right">
        <app-lang-switch></app-lang-switch>
        <app-notification-bell></app-notification-bell>

        <div class="avatar">
          {{ AvatarLetters }}
        </div>
      </div>

    </header>

    <!-- PAGE -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
