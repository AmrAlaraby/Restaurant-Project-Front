<div class="modal-overlay" (click)="cancel()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 class="modal-title">
        {{ 'CHEF.RECIPES.ADD_TITLE' | translate }}
      </h2>

      <button class="close-btn" (click)="cancel()">✕</button>
    </div>

    <div class="modal-body">

      <!-- Menu Item -->
      <div class="field">
        <label class="field-label">
          {{ 'CHEF.RECIPES.MENU_ITEM' | translate }}
        </label>

        <select class="field-select" [(ngModel)]="form.menuItemId">
          <option [value]="0" disabled>
            {{ 'CHEF.RECIPES.SELECT_MENU_ITEM' | translate }}
          </option>

          @for (item of menuItems(); track item.id) {
            <option [value]="item.id">{{ getItemName(item) }}</option>
          }
        </select>
      </div>

      <!-- Ingredient -->
      <div class="field">
        <label class="field-label">
          {{ 'CHEF.RECIPES.INGREDIENT' | translate }}
        </label>

        <select class="field-select" [(ngModel)]="form.ingredientId">
          <option [value]="0" disabled>
            {{ 'CHEF.RECIPES.SELECT_INGREDIENT' | translate }}
          </option>

          @for (ing of ingredients(); track ing.id) {
            <option [value]="ing.id">{{ getIngredientName(ing) }}</option>
          }
        </select>
      </div>

      <!-- Quantity -->
      <div class="field">
        <label class="field-label">
          {{ 'CHEF.RECIPES.QUANTITY' | translate }}
        </label>

        <input
          type="number"
          class="field-input"
          [(ngModel)]="form.quantityRequired"
          min="0.01"
          step="0.01"
          [placeholder]="'CHEF.RECIPES.QUANTITY_PLACEHOLDER' | translate"
        />
      </div>

      <!-- Error -->
      @if (error()) {
        <p class="error-msg">⚠️ {{ error() }}</p>
      }

    </div>

    <div class="modal-footer">

      <button class="btn-cancel" (click)="cancel()">
        {{ 'CHEF.RECIPES.CANCEL' | translate }}
      </button>

      <button
        class="btn-submit"
        (click)="submit()"
        [disabled]="isSubmitting()">

        @if (isSubmitting()) {
          {{ 'CHEF.RECIPES.SAVING' | translate }}
        } @else {
          {{ 'CHEF.RECIPES.ADD_BTN' | translate }}
        }

      </button>

    </div>

  </div>
</div>
