<div class="modal-overlay" (click)="cancel()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 class="modal-title">Add Recipe</h2>
      <button class="close-btn" (click)="cancel()">✕</button>
    </div>

    <div class="modal-body">

      <!-- Menu Item -->
      <div class="field">
        <label class="field-label">Menu Item</label>
        <select class="field-select" [(ngModel)]="form.menuItemId">
          <option [value]="0" disabled>Select menu item...</option>
          @for (item of menuItems(); track item.id) {
            <option [value]="item.id">{{ item.name }}</option>
          }
        </select>
      </div>

      <!-- Ingredient -->
      <div class="field">
        <label class="field-label">Ingredient</label>
        <select class="field-select" [(ngModel)]="form.ingredientId">
          <option [value]="0" disabled>Select ingredient...</option>
          @for (ing of ingredients(); track ing.id) {
            <option [value]="ing.id">{{ ing.name }}</option>
          }
        </select>
      </div>

      <!-- Quantity -->
      <div class="field">
        <label class="field-label">Quantity Required</label>
        <input
          type="number"
          class="field-input"
          [(ngModel)]="form.quantityRequired"
          min="0.01"
          step="0.01"
          placeholder="e.g. 0.25"
        />
      </div>

      <!-- Error -->
      @if (error()) {
        <p class="error-msg">⚠️ {{ error() }}</p>
      }

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="cancel()">Cancel</button>
      <button class="btn-submit" (click)="submit()" [disabled]="isSubmitting()">
        @if (isSubmitting()) { Saving... } @else { Add Recipe }
      </button>
    </div>

  </div>
</div>
