<div class="modal-overlay" (click)="cancel()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-header__brand">
        <span class="modal-header__icon">✏️</span>
        <h2 class="modal-title">
          {{ 'CHEF.RECIPES.EDIT.TITLE' | translate }}
        </h2>
      </div>
      <button class="close-btn" (click)="cancel()">✕</button>
    </div>

    <div class="modal-body">
      <!-- Read-only info -->
      <div class="info-row">
        <span class="info-label">
          {{ 'CHEF.RECIPES.EDIT.MENU_ITEM' | translate }}
        </span>
        <span class="info-value">{{ getItemName(recipe()) }}</span>
      </div>

      <div class="info-row">
        <span class="info-label">
          {{ 'CHEF.RECIPES.EDIT.INGREDIENT' | translate }}
        </span>
        <span class="info-value">{{ getIngredientName(recipe()) }}</span>
      </div>

      <div class="divider"></div>

      <!-- Quantity -->
      <div class="field">
        <label class="field-label">
          {{ 'CHEF.RECIPES.EDIT.QUANTITY' | translate }} ({{ recipe().unit }})
        </label>

        <input
          type="number"
          class="field-input"
          [ngModel]="quantityRequired()"
          (ngModelChange)="quantityRequired.set($event)"
          min="0.01"
          step="0.01"
        />
      </div>

      @if (error()) {
        <p class="error-msg">⚠️ {{ error() }}</p>
      }
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="cancel()">
        {{ 'COMMON.CANCEL' | translate }}
      </button>

      <button class="btn-submit" (click)="submit()" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <span class="btn-submit__spinner"></span>
          {{ 'COMMON.SAVING' | translate }}
        } @else {
          {{ 'CHEF.RECIPES.EDIT.BUTTON' | translate }}
        }
      </button>
    </div>
  </div>
</div>
