<div class="filter-bar">
  <div class="filter-title">
    <span class="filter-icon">⚙</span>
    <span>
      {{ 'CHEF.KITCHEN.FILTERS.TITLE' | translate }}
    </span>
  </div>

  <div class="filter-fields">
    <!-- Order ID -->
    <div class="field-group">
      <label>
        {{ 'CHEF.KITCHEN.FILTERS.ORDER_ID' | translate }}
      </label>
      <input
        type="number"
        [(ngModel)]="params.orderId"
        (ngModelChange)="onOrderIdChange()"
        [placeholder]="'CHEF.KITCHEN.FILTERS.ORDER_PLACEHOLDER' | translate"
        class="field-input"
      />
    </div>

    <!-- Station -->
    <div class="field-group">
      <label>
        {{ 'CHEF.KITCHEN.FILTERS.STATION' | translate }}
      </label>
      <select [(ngModel)]="params.station" (ngModelChange)="onFilterChange()" class="field-input">
        <option [ngValue]="null">
          {{ 'CHEF.KITCHEN.FILTERS.ALL_STATIONS' | translate }}
        </option>

        <option *ngFor="let s of stations" [value]="s.station">
          {{ s.station }} ({{ s.pendingCount }} {{ 'CHEF.KITCHEN.FILTERS.PENDING' | translate }})
        </option>
      </select>
    </div>

    <!-- Status -->
    <div class="field-group">
      <label>
        {{ 'CHEF.KITCHEN.FILTERS.STATUS' | translate }}
      </label>
      <select [(ngModel)]="params.status" (ngModelChange)="onFilterChange()" class="field-input">
        <option *ngFor="let opt of statusOptions" [ngValue]="opt.value">
          {{ opt.label | translate }}
        </option>
      </select>
    </div>
  </div>

  <div class="filter-actions">
    <button class="btn-reset" (click)="onReset()">
      {{ 'CHEF.KITCHEN.FILTERS.RESET' | translate }}
    </button>
  </div>
</div>
