<div class="recipe-list-page">

  <div class="page-toolbar d-flex justify-content-end">
    <button class="btn-add" (click)="showAddModal.set(true)">
      {{ 'CHEF.RECIPES.ADD' | translate }}
    </button>
  </div>

  <app-recipes
    (editRequested)="onEditRequested($event)">
  </app-recipes>

  @if (showAddModal()) {
    <app-add-recipe
      (saved)="onSaved()"
      (cancelled)="showAddModal.set(false)"
    />
  }

  @if (selectedRecipe()) {
    <app-edit-recipe
      [recipe]="selectedRecipe()!"
      (saved)="onSaved()"
      (cancelled)="selectedRecipe.set(null)"
    />
  }

</div>
