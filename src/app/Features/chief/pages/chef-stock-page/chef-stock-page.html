<div class="stock-page">
  <!-- HEADER -->
  <div class="stock-header">
    <div class="stock-header-content">
      <h1 class="stock-title">
        {{ 'CHEF.STOCK.TITLE' | translate }}
      </h1>
      <p class="stock-subtitle">
        {{ 'CHEF.STOCK.SUBTITLE' | translate }}
      </p>
    </div>
  </div>

  <!-- LOADING STATE -->
  <div class="loading-wrap" *ngIf="loading" role="status" aria-live="polite">
    <div class="spinner"></div>
    <span class="loading-text">
      {{ 'CHEF.STOCK.LOADING' | translate }}
    </span>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-wrap" *ngIf="!loading">
    <svg
      class="search-icon"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <input
      class="search-input"
      type="text"
      [placeholder]="'CHEF.STOCK.SEARCH' | translate"
      [(ngModel)]="searchTerm"
      aria-label="Search stock items"
    />
  </div>

  <!-- STOCK GRID -->
  <div class="stock-grid" *ngIf="!loading">
    <!-- Low Stock Section -->
    <app-chef-low-stock [stocks]="lowStocks" class="stock-section"> </app-chef-low-stock>

    <!-- Available Stock Section -->
    <app-chef-available-stock [stocks]="availableStocks" class="stock-section">
    </app-chef-available-stock>

    <!-- EMPTY STATE -->
    <div class="empty-state" *ngIf="allStocks.length === 0" role="status">
      <div class="empty-state-icon">📦</div>
      <span class="empty-state-text">
        {{ 'CHEF.STOCK.EMPTY' | translate }}
      </span>
    </div>
  </div>
</div>
