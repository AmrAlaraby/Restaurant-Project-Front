<div class="stock-page">

  <!-- Header -->
  <div class="stock-header">
    <h1>{{ 'CHEF.STOCK.TITLE' | translate }}</h1>
    <p class="subtitle">
      {{ 'CHEF.STOCK.SUBTITLE' | translate }}
    </p>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" *ngIf="loading">
    <div class="spinner"></div>
    <span>{{ 'CHEF.STOCK.LOADING' | translate }}</span>
  </div>

  <!-- Search -->
  <div class="search-wrap" *ngIf="!loading">
    <span class="search-icon"></span>
    <input
      class="search-input"
      type="text"
      [placeholder]="'CHEF.STOCK.SEARCH' | translate"
      [(ngModel)]="searchTerm" />
  </div>

  <!-- Grid -->
  <div class="stock-grid" *ngIf="!loading">

    <!-- Low Stock -->
    <app-chef-low-stock
      [stocks]="lowStocks">
    </app-chef-low-stock>

    <!-- Available Stock -->
    <app-chef-available-stock
      [stocks]="availableStocks">
    </app-chef-available-stock>

    <!-- Empty state -->
    <div class="empty-state" *ngIf="allStocks.length === 0">
      <span>{{ 'CHEF.STOCK.EMPTY' | translate }}</span>
    </div>

  </div>

</div>
